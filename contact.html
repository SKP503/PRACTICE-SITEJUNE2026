<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 36px;
    max-width: 420px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
  }
  .logo {
    width: 64px; height: 64px;
    background: #7c3aed;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 16px;
  }
  h1 { font-size: 24px; color: #1e293b; margin-bottom: 8px; }
  p.sub { color: #64748b; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    background: #fff;
    color: #2563eb;
    border: 2px solid #2563eb;
  }
  .btn:hover { background: #eff6ff; }
</style>
</head>
<body>

  <div class="card">
    <div class="logo">✉️</div>
    <h1>Contact Page</h1>
    <p class="sub">This is a third, separate file — contact.html. Each page can have its own design, content, and purpose, but they all link together as one website.</p>
    <a href="index.html" class="btn">⬅️ Back to Home</a>
  </div>

</body>
</html>
